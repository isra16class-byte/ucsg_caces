<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CACES · UAFTT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f5f7; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { background: white; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .breadcrumb { font-size: 13px; color: #888; display: flex; align-items: center; gap: 6px; }
        .breadcrumb a { color: #3b3f8c; text-decoration: none; }
        .header-title { font-size: 15px; font-weight: 700; color: #0F1E3C; }
        .header-salir { font-size: 13px; color: #888; cursor: pointer; }

        .tabs { display: flex; gap: 0; padding: 0 24px; border-bottom: 1px solid #e0e0e0; background: white; flex-shrink: 0; }
        .tab { padding: 10px 16px; font-size: 13px; cursor: pointer; text-decoration: none; color: #666; border-bottom: 2px solid transparent; }
        .tab.active { color: #3b3f8c; border-bottom: 2px solid #3b3f8c; font-weight: 600; }

        .content { padding: 16px 24px; flex: 1; overflow: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="breadcrumb">
                <a href="/">← Docencia</a>
                <span>|</span>
                <span style="color: #555;">I2</span>
                <span class="header-title">Seguimiento de Syllabus</span>
            </div>
        </div>
        <div class="header-salir">⬅ Salir</div>
    </div>

    <div class="tabs" id="main-tabs">
        <a href="/" class="tab {% block tab_resultado %}{% endblock %}" data-base="/">📊 Resultado</a>
        <a href="/cohortes/" class="tab {% block tab_cohortes %}{% endblock %}" data-base="/cohortes/">⊞ Cohortes</a>
        <a href="/evidencias/" class="tab {% block tab_evidencias %}{% endblock %}" data-base="/evidencias/">📋 Evidencias</a>
        <a href="/encuesta/" class="tab {% block tab_encuesta %}{% endblock %}" data-base="/encuesta/">📋 Heteroevaluación</a>
        <a href="/ficha-tecnica/" class="tab {% block tab_ficha %}{% endblock %}" data-base="/ficha-tecnica/">📄 Ficha técnica</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

<script>
(function () {
    const STORAGE_KEY = 'caces_cohorte_id';

    // 1. Leer cohorte de la URL actual y guardarla
    const params = new URLSearchParams(window.location.search);
    const cohorteEnUrl = params.get('cohorte');
    if (cohorteEnUrl) {
        localStorage.setItem(STORAGE_KEY, cohorteEnUrl);
    }

    // 2. Al hacer clic en cualquier tab, agregar ?cohorte= si hay una guardada
    const tabs = document.querySelectorAll('#main-tabs .tab');
    tabs.forEach(function (tab) {
        tab.addEventListener('click', function (e) {
            const cohorteId = localStorage.getItem(STORAGE_KEY);
            const base = tab.getAttribute('data-base');
            // Solo agregar cohorte a tabs que la soporten (no a cohortes ni ficha-tecnica)
            const soportaCohorte = ['/','/ evidencias/', '/encuesta/'].some(function(p){
                return base === p || base === p.trim();
            });
            const tabsSinCohorte = ['/cohortes/', '/ficha-tecnica/'];
            if (cohorteId && !tabsSinCohorte.includes(base)) {
                e.preventDefault();
                window.location.href = base + '?cohorte=' + cohorteId;
            }
        });
    });
})();
</script>

</body>
</html>
